<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotDash — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--surface:#0f0f1a;--border:#252538;--accent:#7c6af7;--accent2:#f76a8a;--text:#e8e8f4;--muted:#5a5a7a;--red:#f56a6a}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,.04) 1px,transparent 1px);background-size:48px 48px}
.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none}
.g1{width:400px;height:400px;background:rgba(124,106,247,.12);top:-80px;left:-80px}
.g2{width:400px;height:400px;background:rgba(247,106,138,.08);bottom:-80px;right:-80px}
.card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px 36px;width:100%;max-width:380px;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
h2{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.sub{color:var(--muted);font-size:12px;font-family:'Space Mono',monospace;margin-bottom:28px}
label{display:block;font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px 15px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
input[type=password]:focus{border-color:var(--accent)}
.err{margin-top:10px;padding:9px 13px;background:rgba(245,106,106,.08);border:1px solid rgba(245,106,106,.25);border-radius:6px;color:var(--red);font-size:12px;font-family:'Space Mono',monospace}
button{width:100%;margin-top:18px;padding:13px;background:linear-gradient(135deg,var(--accent),#9b8bf9);border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
button:hover{opacity:.9;transform:translateY(-1px)}
.hint{margin-top:16px;text-align:center;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted)}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="card">
  <div class="logo"><div class="logo-icon">🤖</div><div class="logo-text">Bot<span>Dash</span></div></div>
  <h2>Welcome back</h2>
  <p class="sub">// enter your password</p>
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••••" autofocus>
    {% if error %}<div class="err">⚠ {{ error }}</div>{% endif %}
    <button type="submit">Enter Dashboard →</button>
  </form>
  <p class="hint">Set via DASHBOARD_PASSWORD env var</p>
</div>
</body>
</html>
